  <article>
    <p>本站建站于2019年9月，流下了没有技术只能当一个的无情的做题家的泪水。</p>
<p>最近才算把博客各种窟窿堵上(还有剩下..)</p>
<p>至此终于能说上我有自己的博客了，也总结一下用到了哪些东西<a id="more"></a></p>
<h2 id="博客框架"><a href="#博客框架" class="headerlink" title="博客框架"></a>博客框架</h2><p><strong>Hexo</strong></p>
<h2 id="主机"><a href="#主机" class="headerlink" title="主机"></a>主机</h2><p><strong>Github Pages</strong>（已弃用）</p>
<p><strong>Gitee Pages</strong>（无法使用自定义域名放弃，体感是访问最快的）</p>
<p><strong>Coding Pages</strong>（访问速度过慢…弃用）</p>
<p><strong>Github Pages+Vercel</strong>（目前）：兜兜转转还是回到这里，Vercel使用了Amazon Global Accelerator AGA网络用来加速站点国内访问。<a href="https://luotianyi.vc/4801.html" target="_blank" rel="noopener">https://luotianyi.vc/4801.html</a></p>
<p>上面文章中的博主是用反向代理二级域名作为中间层转发间接访问主域名，我自己则是把二级域名反向代理在Vercel，同时直接连接Github项目把主域名部署在Vercel。</p>
<p>可能搞错了什么，但以香港节点进行的测试的话网站性能极佳。</p>
<p><img src="https://cdn.jsdelivr.net/gh/Azao-saya/image-blog@master/20210102/QQ图片20210120143557.2lhpncbf5d20.png" alt></p>
<p><img src="https://cdn.jsdelivr.net/gh/Azao-saya/image-blog@master/20210102/QQ图片20210120143835.2zu95zm64zg0.png" alt></p>
<h2 id="主题"><a href="#主题" class="headerlink" title="主题"></a>主题</h2><p>nexmoe: <a href="https://github.com/theme-nexmoe/hexo-theme-nexmoe" target="_blank" rel="noopener">https://github.com/theme-nexmoe/hexo-theme-nexmoe</a></p>
<h2 id="评论"><a href="#评论" class="headerlink" title="评论"></a>评论</h2><p>使用了一段时间<strong>Gitalk</strong>： <a href="https://5ime.cn/646.html" target="_blank" rel="noopener">https://5ime.cn/646.html</a> </p>
<p>初始化麻烦后弃用</p>
<p>更换为<strong>Valine</strong>：<a href="https://valine.js.org/" target="_blank" rel="noopener">https://valine.js.org/</a></p>
<p>评论系统放在<strong>Leancloud</strong>：<a href="https://www.leancloud.cn/" target="_blank" rel="noopener">https://www.leancloud.cn/</a></p>
<p>尚未使用<strong>Valine-Admin</strong>，卡在备案的域名上，所以瞎了。</p>
<p>需要和我联系最好用主页上提供的任意联系方式，或者评论在关于我上随缘交流。</p>
<p>听说已有<strong>valine</strong>的上位替代<strong>waline</strong>了，直观感受到了学到死的现状。</p>
<h2 id="图床"><a href="#图床" class="headerlink" title="图床"></a>图床</h2><p>最开始使用<strong>SM.MS</strong>配合<strong>Quicker</strong>的插件一键上传图片，有被方便到。</p>
<p>后发现加载速度很慢，便从别人博客偷师，发现图片地址带了<strong>jsDelivr</strong> </p>
<p>找上了<strong>PicX</strong>， 基于 <strong>GitHub</strong> 的图床神器，使用 <strong>jsDeliv</strong>r 进行 CDN 加速 </p>
<p>需要注意的是如果图片文件名称的字符过于离奇会导致无法上传，上传中发有图片歧视后尝试更改名称解决。</p>
<p>目前使用图片已全部迁移</p>
<h2 id="加了什么"><a href="#加了什么" class="headerlink" title="加了什么"></a>加了什么</h2><p><strong>插件:</strong></p>
<p><strong>hexo-renderer-kramed:</strong> <a href="https://github.com/sun11/hexo-renderer-kramed" target="_blank" rel="noopener">https://github.com/sun11/hexo-renderer-kramed</a></p>
<p><strong>hexo-renderer-mathjax :</strong> <a href="https://github.com/phoenixcw/hexo-renderer-mathjax" target="_blank" rel="noopener">https://github.com/phoenixcw/hexo-renderer-mathjax</a></p>
<p>文章中使用了LaTeX公式，Hexo默认不支持并和markwon语义存在冲突，安装后需要更改配置</p>
<p>avatarRotateZ ：头像旋转，配上我自己的头像感觉挺可爱的</p>
<p>不知道叫啥： 当博客为不活跃标签页时，更换站点标题为</p>
<p>“我在这呢 大于等于 欧米伽 小于等于”</p>
<p>本来还有很多花里胡哨的感觉会拖累网站性能还是删除了</p>
