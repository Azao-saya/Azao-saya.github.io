    <h1 id="前言"><a href="#前言" class="headerlink" title="前言"></a>前言</h1><p>作为一个新进程序员，<a id="more"></a> 使用Markdown写文档的时间还不是很多，对很多语法也不是很熟悉，网上的教程也很纷杂，很多并不是很完整。为了方便自己下次有需求时使用，遂对自己了解到的Markdown语法进行整理。<br><br><strong><em>注</em></strong>:由于编辑器的不同，其对Markdown语法的支持程度也不尽相同，本文所使用的编辑器是Typora。</p>
<h2 id="1-标题"><a href="#1-标题" class="headerlink" title="1.标题"></a>1.标题</h2><p>在想要设置为标题的文字前面加#来表示<br>一个#是一级标题，二个#是二级标题，以此类推。支持六级标题。<br>示例</p>
<pre class=" language-lang-bash"><code class="language-lang-bash"># 这是一级标题
## 这是二级标题
### 这是三级标题
#### 这是四级标题
##### 这是五级标题
###### 这是六级标题
</code></pre>
<p><u>效果如下：</u></p>
<h1 id="这是一级标题"><a href="#这是一级标题" class="headerlink" title="这是一级标题"></a>这是一级标题</h1><h2 id="这是二级标题"><a href="#这是二级标题" class="headerlink" title="这是二级标题"></a>这是二级标题</h2><h3 id="这是三级标题"><a href="#这是三级标题" class="headerlink" title="这是三级标题"></a>这是三级标题</h3><h4 id="这是四级标题"><a href="#这是四级标题" class="headerlink" title="这是四级标题"></a>这是四级标题</h4><h5 id="这是五级标题"><a href="#这是五级标题" class="headerlink" title="这是五级标题"></a>这是五级标题</h5><h6 id="这是六级标题"><a href="#这是六级标题" class="headerlink" title="这是六级标题"></a>这是六级标题</h6><p>（多的#似乎是主题的原因）</p>
<h2 id="2-字体"><a href="#2-字体" class="headerlink" title="2.字体"></a>2.字体</h2><ul>
<li>加粗</li>
</ul>
<p>要加粗的文字左右分别用两个*号包起来</p>
<ul>
<li>斜体</li>
</ul>
<p>要倾斜的文字左右分别用一个*号包起来</p>
<ul>
<li>斜体加粗</li>
</ul>
<p>要倾斜和加粗的文字左右分别用三个*号包起来</p>
<ul>
<li>删除线</li>
</ul>
<p>要加删除线的文字左右分别用两个~~号包起来</p>
<p>示例：</p>
<pre class=" language-lang-undefined"><code class="language-lang-undefined">**这是加粗的文字**
*这是倾斜的文字*`
***这是斜体加粗的文字***
~~这是加删除线的文字~~
</code></pre>
<p><u>效果如下：</u></p>
<p><strong>这是加粗的文字</strong><br><em>这是倾斜的文字</em><br><strong><em>这是斜体加粗的文字</em></strong><br><del>这是加删除线的文字</del></p>
<h2 id="3-分隔线"><a href="#3-分隔线" class="headerlink" title="3.分隔线"></a><strong>3.分隔线</strong></h2><p> 可以在一行中用三个以上的星号*、减号-、底线_来建立一个分隔线，行内不能有其他东西，你也可以在星号或减号蹭插入空格。下面这种写法都可以建立分隔线： </p>
<pre class=" language-lang-text"><code class="language-lang-text">***
******
---
------
</code></pre>
<p><u>效果如下：</u></p>
<hr>
<h2 id><a href="#" class="headerlink" title="**"></a><strong>**</strong></h2><h2 id="4-锚点"><a href="#4-锚点" class="headerlink" title="4.锚点"></a>4.锚点</h2><p>网页中，锚点其实就是页内超链接，也就是链接本文档内部的某些元素，实现当前页面中的跳转。比如我这里写下一个锚点，点击回到目录，就能跳转到目录。 在目录中点击这一节，就能跳过来。还有下一节的注脚。这些根本上都是用锚点来实现的。 </p>
<pre><code>## 1.标题{#title}

跳转到[标题](#title)
</code></pre><p>效果如下：</p>
<p>无法实现，甚至代码块里的内容出现在文章里,就会导致Error：expected end of comment, got end of file</p>
<h2 id="5-引用"><a href="#5-引用" class="headerlink" title="5.引用"></a>5.引用</h2><p>在引用的文字前加&gt;即可。 引用也可以嵌套，如加两个&gt;&gt;三个&gt;&gt;&gt;<br>  n个…</p>
<p>示例：</p>
<pre class=" language-lang-ruby"><code class="language-lang-ruby">>这是引用的内容
>>这是引用的内容
>>>>>>>>>>这是引用的内容
</code></pre>
<p><u>效果如下：</u></p>
<blockquote>
<p>这是引用的内容</p>
<blockquote>
<p>这是引用的内容</p>
<blockquote>

<blockquote>

<p>这是引用的内容</p>
</blockquote>

<h2 id="6-超链接"><a href="#6-超链接" class="headerlink" title="6.超链接"></a>6.超链接</h2><h3 id="6-1行内式"><a href="#6-1行内式" class="headerlink" title="6.1行内式"></a>6.1行内式</h3><ul>
<li><p>[]里写链接文字，()里写链接地址, ()中的”“中可以为链接指定title属性，title属性可加可不加。title属性的效果是鼠标悬停在链接上会出现指定的 title文字。<a href="链接地址 “链接标题”">链接文字</a>’这样的形式。链接地址与链接标题前有一个空格。</p>
<pre><code> 1. `欢迎来到[避风港](https://soulflower.gitee.io)`
 2.  `欢迎来到[soulflower](https://soulflower.gitee.io &quot;避风港&quot;)`
</code></pre></li>
