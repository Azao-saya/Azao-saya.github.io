  <article>
    <p>  很有幸和这么多大佬一起陪考了这次2019冬季考试，也很幸运的能有机会见到pat的出题人陈越姥姥，看着陈越姥姥给满分的同学拍照一起面带笑容讨论考研和计算机的未来前景，内心着实是十分欣羡和向往这种生活，却又与67的我显得格格不入。 <a id="more"></a></p>
<p>  因为程序已经没有提交的入口了，重做也无法知道自己有没有做对。</p>
<p>  所以这篇博客并不是题解而是给自己与pat短暂的相处画上句号。</p>
<h1 id="7-1-2019数列"><a href="#7-1-2019数列" class="headerlink" title="7-1 2019数列"></a>7-1 2019数列</h1><p>把 2019 各个数位上的数字 2、0、1、9 作为一个数列的前 4 项，用它们去构造一个无穷数列，其中第 <em>n</em>（&gt;4）项是它前 4 项之和的个位数字。例如第 5 项为 2， 因为 2+0+1+9=12，个位数是 2。</p>
<p>本题就请你编写程序，列出这个序列的前 <em>n</em> 项。</p>
<h2 id="输入描述"><a href="#输入描述" class="headerlink" title="输入描述"></a>输入描述</h2><blockquote>
<p>  输入给出正整数 <em>n</em>（≤1000）。 </p>
</blockquote>
<h2 id="输出描述"><a href="#输出描述" class="headerlink" title="输出描述:"></a>输出描述:</h2><blockquote>
<p> 在一行中输出数列的前 <em>n</em> 项，数字间不要有空格。 </p>
</blockquote>
<h3 id="输入"><a href="#输入" class="headerlink" title="输入"></a>输入</h3><blockquote>
<p>10</p>
</blockquote>
<h3 id="输出"><a href="#输出" class="headerlink" title="输出"></a>输出</h3><blockquote>
<p>2019224758</p>
</blockquote>
<p> <strong>题外话：</strong>这个数列中永远不会出现 <code>2018</code>，你能证明吗？ </p>
<ul>
<li>刚上手这道题的时候自己挺紧张的，考试使用的ide Eclipse Oxygen 和我自己使用的版本有所差别。</li>
<li>在使用惯用的热键写代码时，一度导致屏幕里显示的内容翻转了….</li>
<li>老师当时离开了教室一会，呼救没人搭理….只能自己小心翼翼的调整了回来。</li>
<li>加上有规定不能打开游览器否则按作弊处理，而谷歌游览器就在任务栏上…..</li>
<li>之后的考试时间就格外的小心除了ctrl+c ctrl+v和alt+/没有再使用别的热键了。</li>
<li>也为之后的超时埋下了伏笔</li>
<li>言归正传这题没啥难度，注意n&lt;4的能正常输出内容即可。</li>
</ul>
<hr>
<hr>
<pre><code>import java.io.*;


public class Main {

    public static void main(String[] args) throws IOException{
        // TODO Auto-generated method stub
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine());
        StringBuilder sb = new StringBuilder();
        int[] list = new int[1001];
        list[0]=2;
        list[1]=0;
        list[2]=1;
        list[3]=9;
        if(n&lt;4) {
            for(int i =0;i&lt;n;i++) {
                sb.append(list[i]);
            }
            System.out.println(sb.toString().trim());
            System.exit(0);
        }
        sb.append(2019);
        for(int i =4;i&lt;n;i++) {
            int sum =0;

<p>因为游戏时间不能太长，我们把玩家分成 <em>N</em> 组，每组 <em>M</em> 只老鼠同场竞技，然后从 <em>N</em> 个分组冠军中直接选出最胖的冠军胖胖鼠。现在就请你写个程序来得到冠军的体重。</p>

</blockquote>
<h2 id="输出描述-1"><a href="#输出描述-1" class="headerlink" title="输出描述:"></a>输出描述:</h2><blockquote>
<p>首先在第一行顺次输出各组冠军的体重，数字间以 1 个空格分隔，行首尾不得有多余空格。随后在第二行输出冠军胖胖鼠的体重。 </p>
</blockquote>

</blockquote>

<p>88 31 91<br>91</p>
</blockquote>
<ul>
<li>这题设置两个最大值，最近考试姥姥给的运行时间很充裕，程序一遍写下来就能过。</li>
<li>不过java的话太多输入还是会超时，最后两题都是有超时的测试点。而我最后一题甚至只才写了一个开头就已经超时了。</li>
