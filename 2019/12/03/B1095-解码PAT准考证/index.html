    <h2 id="题目描述"><a href="#题目描述" class="headerlink" title="题目描述 "></a>题目描述 <a id="more"></a></h2><p>PAT 准考证号由 4 部分组成：</p>
<ul>
<li>第 1 位是级别，即 <code>T</code> 代表顶级；<code>A</code> 代表甲级；<code>B</code> 代表乙级；</li>
<li>第 2~4 位是考场编号，范围从 101 到 999；</li>
<li>第 5~10 位是考试日期，格式为年、月、日顺次各占 2 位；</li>
<li>最后 11~13 位是考生编号，范围从 000 到 999。</li>
</ul>
<p>现给定一系列考生的准考证号和他们的成绩，请你按照要求输出各种统计信息。</p>
<h2 id="输入描述"><a href="#输入描述" class="headerlink" title="输入描述"></a>输入描述</h2><blockquote>
<p> 输入首先在一行中给出两个正整数 N（≤10<br> 4<br>  ）和 M（≤100），分别为考生人数和统计要求的个数。</p>
<p> 接下来 N 行，每行给出一个考生的准考证号和其分数（在区间 [0,100] 内的整数），其间以空格分隔。</p>
<p> 考生信息之后，再给出 M 行，每行给出一个统计要求，格式为：类型 指令，其中</p>
<p> 类型 为 1 表示要求按分数非升序输出某个指定级别的考生的成绩，对应的 指令 则给出代表指定级别的字母；<br> 类型 为 2 表示要求将某指定考场的考生人数和总分统计输出，对应的 指令 则给出指定考场的编号；<br> 类型 为 3 表示要求将某指定日期的考生人数分考场统计输出，对应的 指令 则给出指定日期，格式与准考证上日期相同。</p>
</blockquote>
<h2 id="输出描述"><a href="#输出描述" class="headerlink" title="输出描述"></a>输出描述</h2><blockquote>
<p>  对每项统计要求，首先在一行中输出 Case #: 要求，其中 # 是该项要求的编号，从 1 开始；要求 即复制输入给出的要求。随后输出相应的统计结果：</p>
<p>  类型 为 1 的指令，输出格式与输入的考生信息格式相同，即 准考证号 成绩。对于分数并列的考生，按其准考证号的字典序递增输出（题目保证无重复准考证号）；<br>  类型 为 2 的指令，按 人数 总分 的格式输出；<br>  类型 为 3 的指令，输出按人数非递增顺序，格式为 考场编号 总人数。若人数并列则按考场编号递增顺序输出。<br>  如果查询结果为空，则输出 NA。</p>
</blockquote>
<h2 id="示例"><a href="#示例" class="headerlink" title="示例"></a>示例</h2><h3 id="输入"><a href="#输入" class="headerlink" title="输入"></a>输入</h3><blockquote>
<p>8 4<br>B123180908127 99<br>B102180908003 86<br>A112180318002 98<br>T107150310127 62<br>A107180908108 100<br>T123180908010 78<br>B112160918035 88<br>A107180908021 98<br>1 A<br>2 107<br>3 180908<br>2 999</p>
</blockquote>
<h3 id="输出"><a href="#输出" class="headerlink" title="输出"></a>输出</h3><blockquote>
<p>Case 1: 1 A<br>A107180908108 100<br>A107180908021 98<br>A112180318002 98<br>Case 2: 2 107<br>3 260<br>Case 3: 3 180908<br>107 2<br>123 2<br>102 1<br>Case 4: 2 999<br>NA</p>
</blockquote>
<h2 id="解题思路："><a href="#解题思路：" class="headerlink" title="解题思路："></a>解题思路：</h2><ul>
<li>排序问题，按照3种不同的指令输出三种结果。</li>
<li>类型1，分别有T、A、B三种输入。从map里取出准考证，在单独取出第一位字母判断是否与输入的字母相同。若相同则保存</li>
<li>类型2，输入的为第2~4位的考场编号。取出准考证后用subString截取(1,4)位。若与输入相同则保存</li>
<li>类型3也是一样。</li>
<li>全部存入后按照题意排序。分数和人数是降序排序，若数字相同。则按其准考证号的字典序递增输出，compareTo能进行这个判断。</li>
</ul>
<hr>
<hr>
<pre><code>import java.io.BufferedReader;
import java.io.IOException;
import java.io.InputStreamReader;
import java.util.*;

/**
 * 提交时间                 状态      分数     题目      编译器         耗时    用户
 * 2019/11/24 02:17:26  部分正确   16    1095    Java (openjdk)     86 ms    決别
 * Case 2,3,4:TLE
 * 写出来就感觉要超时了，优化的话网上没找到别人的java代码，大概是止步于此了。
 * 马上就是12月份的正式考试了，我很感谢这107道习题让我正式的入门了java。
 * 我不知道是不是在就业的路上走偏了，但是这条路我没有退路也决不会放弃。
 */
public class PAT_B1095 {

    public static void main(String[] args) throws IOException {
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        String[] temp = br.readLine().split(&quot; &quot;);
        int n = Integer.parseInt(temp[0]);
        int m = Integer.parseInt(temp[1]);
        Map&lt;String,Integer&gt; map = new HashMap&lt;&gt;();

        for (int i = 0; i &lt;n ; i++) {
            String[] s = br.readLine().split(&quot; &quot;);
            map.put(s[0],Integer.parseInt(s[1]));
        }

        for (int i = 0; i &lt;m ; i++) {
            ArrayList&lt;Node3&gt; list = new ArrayList&lt;&gt;();
            String[] s2 = br.readLine().split(&quot; &quot;);
            int sum = 0,count = 0;
            int number = Integer.parseInt(s2[0]);
            if (number ==1){
                char c = s2[1].toCharArray()[0];
                for(Map.Entry&lt;String, Integer&gt; entry : map.entrySet()){
                    String mapKey = entry.getKey();
                    if (mapKey.charAt(0) == c){
                        list.add(new Node3(mapKey,entry.getValue()));
                    }
                }
                Collections.sort(list,new Node3CMP());
            }else if(number == 2){
                for(Map.Entry&lt;String, Integer&gt; entry : map.entrySet()){
                    String mapKey = entry.getKey().substring(1,4);
                    if (mapKey.equals(s2[1])){
                        count++;
                        sum += entry.getValue();
                    }
                }
            }else {
                Map&lt;String,Integer&gt; map2 = new HashMap&lt;&gt;();
                for(Map.Entry&lt;String, Integer&gt; entry : map.entrySet()){
                    String mapKeyT = entry.getKey();
                    String mapKey1 = mapKeyT.substring(4,10);
                    String mapKey2 = mapKeyT.substring(1,4);
                    if (mapKey1.equals(s2[1])){
                        if (map2.containsKey(mapKey2)){
                            map2.put(mapKey2,map2.get(mapKey2)+1);
                            continue;
                        }
                        map2.put(mapKey2,1);
                    }
                }
                for(Map.Entry&lt;String, Integer&gt; entry : map2.entrySet()){
                    list.add(new Node3(entry.getKey(),entry.getValue()));
                }
                Collections.sort(list,new Node3CMP());
            }

            System.out.printf(&quot;%s %d: %s %s\n&quot;,&quot;Case&quot;,i+1,s2[0],s2[1]);
            if (list.size() == 0 &amp;&amp; count==0){
                System.out.println(&quot;NA&quot;);
            }else if (count !=0){
                System.out.println(count+&quot; &quot;+sum);
            }else {
                for (Node3 n3 : list) {
                    System.out.println(n3.id+&quot; &quot;+n3.value);
                }
            }
        }
    }
}

class Node3{
    String id;
    int value;
    public Node3(String id,int value){
        this.id = id;
        this.value = value;
    }
}

class Node3CMP implements Comparator&lt;Node3&gt; {
    public int compare(Node3 o1,Node3 o2){
        int x = o2.value - o1.value;
        if (x == 0){
            return o1.id.compareTo(o2.id);
        }else {
            return x;
        }
    }
}
