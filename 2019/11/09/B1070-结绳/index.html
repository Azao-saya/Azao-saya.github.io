    <h2 id="题目描述"><a href="#题目描述" class="headerlink" title="题目描述 "></a>题目描述 <a id="more"></a></h2><p>给定一段一段的绳子，你需要把它们串成一条绳。每次串连的时候，是把两段绳子对折，再如下图所示套接在一起。这样得到的绳子又被当成是另一段绳子，可以再次对折去跟另一段绳子串连。每次串连后，原来两段绳子的长度就会减半。</p>
<p><img data-fancybox="gallery" data-sizes="auto" data-src="https://images.ptausercontent.com/46293e57-aa0e-414b-b5c3-7c4b2d5201e2.jpg" alt="rope.jpg" class="lazyload"></p>
<p>给定 <em>N</em> 段绳子的长度，你需要找出它们能串成的绳子的最大长度。</p>
<h2 id="输入描述"><a href="#输入描述" class="headerlink" title="输入描述"></a>输入描述</h2><blockquote>
<pre><code>每个输入包含 1 个测试用例。每个测试用例第 1 行给出正整数 *N* (2≤*N*≤104)；第 2 行给出 *N* 个正整数，即原始绳段的长度，数字间以空格分隔。所有整数都不超过104。 
</code></pre></blockquote>
<h2 id="输出描述"><a href="#输出描述" class="headerlink" title="输出描述:"></a>输出描述:</h2><blockquote>
<pre><code>在一行中输出能够串成的绳子的最大长度。结果向下取整，即取为不超过最大长度的最近整数。 
</code></pre></blockquote>
<h2 id="示例"><a href="#示例" class="headerlink" title="示例"></a>示例</h2><h3 id="输入"><a href="#输入" class="headerlink" title="输入"></a>输入</h3><blockquote>
<p>8<br>10 15 12 3 4 13 1 15</p>
</blockquote>
<h3 id="输出"><a href="#输出" class="headerlink" title="输出"></a>输出</h3><blockquote>
<p>14</p>
</blockquote>
<h2 id="解题思路："><a href="#解题思路：" class="headerlink" title="解题思路："></a>解题思路：</h2><ul>
<li>每次串连的时候，是把两段绳子对折 。</li>
<li>就是连接两个绳子后绳子长度减半，连接后的绳子当做一根绳子连接另一条绳子后总长度再减半。</li>
<li>隐藏的坑就是 你需要找出它们能串成的绳子的最大长度。 </li>
<li>也不算隐藏吧，输入样例没经过排序的话也是得不到14的。但是这怎么看都应该是一道15分的题。</li>
<li>难度浮动还是太大了，希望考试的时候别出难度鸭。</li>
</ul>
<hr>
<hr>
<pre><code>import java.io.BufferedReader;
import java.io.IOException;
import java.io.InputStreamReader;
import java.util.Arrays;

public class PAT_B1070 {
    public static void main(String[] args) throws IOException {
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine());
        String[] temp = br.readLine().split(&quot; &quot;);
        int[] numbers = new int[n];
        for (int i = 0; i &lt;n ; i++) {
            numbers[i] = Integer.parseInt(temp[i]);
        }
        Arrays.sort(numbers); //隐藏坑如果要使串成的绳子最长，需要避免长的绳子从一开始就被反复折叠。
        double sum = numbers[0];
        for (int i = 1; i &lt;n ; i++) {
            double num = numbers[i];
            sum = (sum+num)/2;
        }
        System.out.println((int)sum);
    }
}
</code></pre>
