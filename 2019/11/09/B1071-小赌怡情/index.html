    <h2 id="题目描述"><a href="#题目描述" class="headerlink" title="题目描述 "></a>题目描述 <a id="more"></a></h2><p>常言道“小赌怡情”。这是一个很简单的小游戏：首先由计算机给出第一个整数；然后玩家下注赌第二个整数将会比第一个数大还是小；玩家下注 t 个筹码后，计算机给出第二个数。若玩家猜对了，则系统奖励玩家 t 个筹码；否则扣除玩家 t 个筹码。</p>
<p>注意：玩家下注的筹码数不能超过自己帐户上拥有的筹码数。当玩家输光了全部筹码后，游戏就结束。</p>
<h2 id="输入描述"><a href="#输入描述" class="headerlink" title="输入描述"></a>输入描述</h2><blockquote>
<p>   输入在第一行给出 2 个正整数 T 和 K（≤ 100），分别是系统在初始状态下赠送给玩家的筹码数、以及需要处理的游戏次数。随后 K 行，每行对应一次游戏，顺序给出 4 个数字：</p>
<pre><code>   n1 b t n2
</code></pre><p>   其中 <code>n1</code> 和 <code>n2</code> 是计算机先后给出的两个[0, 9]内的整数，保证两个数字不相等。<code>b</code> 为 0 表示玩家赌<code>小</code>，为 1 表示玩家赌<code>大</code>。<code>t</code> 表示玩家下注的筹码数，保证在整型范围内。</p>
</blockquote>
<h2 id="输出描述"><a href="#输出描述" class="headerlink" title="输出描述:"></a>输出描述:</h2><blockquote>
<p>   对每一次游戏，根据下列情况对应输出（其中 <code>t</code> 是玩家下注量，<code>x</code> 是玩家当前持有的筹码量）：</p>
<ul>
<li>玩家赢，输出 <code>Win t!  Total = x.</code>；</li>
<li>玩家输，输出 <code>Lose t.  Total = x.</code>；</li>
<li>玩家下注超过持有的筹码量，输出 <code>Not enough tokens.  Total = x.</code>；</li>
<li>玩家输光后，输出 <code>Game Over.</code> 并结束程序。 </li>
</ul>
</blockquote>
<h2 id="示例"><a href="#示例" class="headerlink" title="示例"></a>示例</h2><h3 id="输入1"><a href="#输入1" class="headerlink" title="输入1"></a>输入1</h3><blockquote>
<p>100 4<br>8 0 100 2<br>3 1 50 1<br>5 1 200 6<br>7 0 200 8</p>
</blockquote>
<h3 id="输出1"><a href="#输出1" class="headerlink" title="输出1"></a>输出1</h3><blockquote>
<p>Win 100!  Total = 200.<br>Lose 50.  Total = 150.<br>Not enough tokens.  Total = 150.<br>Not enough tokens.  Total = 150.</p>
</blockquote>
<h3 id="输入2"><a href="#输入2" class="headerlink" title="输入2"></a>输入2</h3><blockquote>
<p>100 4<br>8 0 100 2<br>3 1 200 1<br>5 1 200 6<br>7 0 200 8</p>
</blockquote>
<h3 id="输出2"><a href="#输出2" class="headerlink" title="输出2"></a>输出2</h3><blockquote>
<p>Win 100!  Total = 200.<br>Lose 200.  Total = 0.<br>Game Over.</p>
</blockquote>
<h2 id="解题思路："><a href="#解题思路：" class="headerlink" title="解题思路："></a>解题思路：</h2><ul>
<li>主要就是对持有筹码的判断，如果下注的筹码超过持有的，就continue到下一个循环。</li>
<li>有筹码足够就进入下一个判断，两个结果赢或者输。</li>
<li>最后判断是否还有筹码，若花光了立即结束循环。</li>
<li>题目并没有设胜利条件…..</li>
</ul>
<hr>
<hr>
<pre><code>import java.io.BufferedReader;
import java.io.IOException;
import java.io.InputStreamReader;

public class Main {
    public static void main(String[] args) throws IOException {
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        String[] temp = br.readLine().split(&quot; &quot;);
        int tokens = Integer.parseInt(temp[0]);
        int n = Integer.parseInt(temp[1]);
        for (int i = 0; i &lt;n ; i++) {
            String[] s = br.readLine().split(&quot; &quot;);
            int n1 = Integer.parseInt(s[0]);
            int b = Integer.parseInt(s[1]);
            int t = Integer.parseInt(s[2]);
            int n2 = Integer.parseInt(s[3]);
            if (tokens &lt; t){
                System.out.printf(&quot;Not enough tokens.  Total = %d.\n&quot;,tokens);
                continue;
            }
            if ((n1&gt;n2&amp;&amp;b==0)||(n1&lt;n2&amp;&amp;b==1)){
                tokens +=t;
                System.out.printf(&quot;Win %d!  Total = %d.\n&quot;,t,tokens);
            }else {
                tokens -=t;
                System.out.printf(&quot;Lose %d.  Total = %d.\n&quot;,t,tokens);
            }
            if (tokens ==0){
                System.out.println(&quot;Game Over.&quot;);
                break;
            }
        }
    }
}
</code></pre>
