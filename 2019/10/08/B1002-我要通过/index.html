    <h2 id="题目描述"><a href="#题目描述" class="headerlink" title="题目描述 "></a>题目描述 <a id="more"></a></h2><blockquote>
<p>“<strong>答案正确</strong>”是自动判题系统给出的最令人欢喜的回复。本题属于 PAT 的“<strong>答案正确</strong>”大派送 —— 只要读入的字符串满足下列条件，系统就输出“<strong>答案正确</strong>”，否则输出“<strong>答案错误</strong>”。</p>
<p>得到“<strong>答案正确</strong>”的条件是：</p>
<ol>
<li><p>字符串中必须仅有 <code>P</code>、 <code>A</code>、 <code>T</code>这三种字符，不可以包含其它字符；</p>
</li>
<li><p>任意形如 <code>xPATx</code> 的字符串都可以获得“<strong>答案正确</strong>”，其中 <code>x</code> 或者是空字符串，或者是仅由字母 <code>A</code> 组成的字符串；</p>
</li>
<li><p>如果 <code>aPbTc</code> 是正确的，那么 <code>aPbATca</code> 也是正确的，其中 <code>a</code>、 <code>b</code>、 <code>c</code> 均或者是空字符串，或者是仅由字母 <code>A</code> 组成的字符串。</p>
<p>现在就请你为 PAT 写一个自动裁判程序，判定哪些字符串是可以获得“<strong>答案正确</strong>”的。</p>
</li>
</ol>
</blockquote>
<h2 id="输入描述"><a href="#输入描述" class="headerlink" title="输入描述:"></a>输入描述:</h2><blockquote>
<p>每个测试输入包含 1 个测试用例，即给出自然数 <em>n</em> 的值。这里保证 <em>n</em> 小于 10100。</p>
</blockquote>
<h2 id="输出描述"><a href="#输出描述" class="headerlink" title="输出描述:"></a>输出描述:</h2><blockquote>
<p>每个字符串的检测结果占一行，如果该字符串可以获得“<strong>答案正确</strong>”，则输出 <code>YES</code>，否则输出 <code>NO</code>。</p>
</blockquote>
<h2 id="示例"><a href="#示例" class="headerlink" title="示例"></a>示例</h2><h3 id="输入例子"><a href="#输入例子" class="headerlink" title="输入例子:"></a>输入例子:</h3><blockquote>
<pre class=" language-lang-in"><code class="language-lang-in">8
PAT
PAAT
AAPATAA
AAPAATAAAA
xPATx
PT
Whatever
APAAATAA
</code></pre>
</blockquote>
<h3 id="输出例子"><a href="#输出例子" class="headerlink" title="输出例子:"></a>输出例子:</h3><blockquote>
<pre class=" language-lang-out"><code class="language-lang-out">YES
YES
YES
YES
NO
NO
NO
NO
</code></pre>
<p>解题思路</p>
<p>通过看别人的代码了解了正则表达式这个概念，题目很容易就解出来了</p>
<p>+号为一个或多个，*号为零个或多个</p>
<p>条件123都是在满足前置条件的扩展，一开始也是没转过弯来</p>
</blockquote>
<pre><code>import java.io.BufferedInputStream;
import java.util.Scanner;

public class PAT_B1003 {
    public static void main(String[] args) {
        Scanner sc = new Scanner(new BufferedInputStream(System.in));
        int n = Integer.parseInt(sc.nextLine());
        String[] str = new String[11];
        for (int i = 0; i &lt; n; i++) {
            str[i] = sc.next();
        }
        for (String s : str) {
            judge(s);
        }
    }
    public static void judge(String s) {
        String pattern = &quot;A*PA+TA*&quot;;
        String pattern1 = &quot;PA+T&quot;;
        if (s.matches(pattern)) {
            if (s.matches(pattern1)) {
                System.out.println(&quot;YES&quot;);
            } else {
                String temp[] = s.split(&quot;P|T&quot;);
                int aLength = temp[0].length();
                int bLength = temp[1].length();
                int cLength = temp[2].length();
                if ((cLength - aLength) / aLength == (bLength - 1)) {
                    System.out.println(&quot;YES&quot;);
                } else {
                    System.out.println(&quot;NO&quot;);
                }

            }
        } else {
            System.out.println(&quot;NO&quot;);
        }
    }
}
</code></pre>
