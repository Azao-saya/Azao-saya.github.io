    <h2 id="题目描述"><a href="#题目描述" class="headerlink" title="题目描述 "></a>题目描述 <a id="more"></a></h2><ul>
<li>大侦探福尔摩斯接到一张奇怪的字条：<code>我们约会吧！ 3485djDkxh4hhGE 2984akDfkkkkggEdsb s&amp;hgsfdk d&amp;Hyscvnm</code>。大侦探很快就明白了，字条上奇怪的乱码实际上就是约会的时间<code>星期四 14:04</code>，因为前面两字符串中第 1 对相同的大写英文字母（大小写有区分）是第 4 个字母 <code>D</code>，代表星期四；第 2 对相同的字符是 <code>E</code> ，那是第 5 个英文字母，代表一天里的第 14 个钟头（于是一天的 0 点到 23 点由数字 0 到 9、以及大写字母 <code>A</code> 到 <code>N</code> 表示）；后面两字符串第 1 对相同的英文字母 <code>s</code> 出现在第 4 个位置（从 0 开始计数）上，代表第 4 分钟。现给定两对字符串，请帮助福尔摩斯解码得到约会的时间。 </li>
</ul>
<h2 id="输入描述"><a href="#输入描述" class="headerlink" title="输入描述"></a>输入描述</h2><blockquote>
<p>   输入在 4 行中分别给出 4 个非空、不包含空格、且长度不超过 60 的字符串。 </p>
</blockquote>
<h2 id="输出描述"><a href="#输出描述" class="headerlink" title="输出描述:"></a>输出描述:</h2><blockquote>
<p>   在一行中输出约会的时间，格式为 <code>DAY HH:MM</code>，其中 <code>DAY</code> 是某星期的 3 字符缩写，即 <code>MON</code> 表示星期一，<code>TUE</code> 表示星期二，<code>WED</code> 表示星期三，<code>THU</code> 表示星期四，<code>FRI</code>表示星期五，<code>SAT</code> 表示星期六，<code>SUN</code> 表示星期日。题目输入保证每个测试存在唯一解。 </p>
</blockquote>
<h2 id="示例"><a href="#示例" class="headerlink" title="示例"></a>示例</h2><h3 id="输入"><a href="#输入" class="headerlink" title="输入"></a>输入</h3><blockquote>
<p>3485djDkxh4hhGE<br>2984akDfkkkkggEdsb<br>s&amp;hgsfdk<br>d&amp;Hyscvnm</p>
</blockquote>
<h3 id="输出"><a href="#输出" class="headerlink" title="输出"></a>输出</h3><blockquote>
<p>THU 14:04</p>
</blockquote>
<h2 id="解题思路："><a href="#解题思路：" class="headerlink" title="解题思路："></a>解题思路：</h2><ul>
<li><p>说实话通过字符ASCLL表的加减得到0到23，虽然能够理解让我自己再现我考虑不到。</p>
</li>
<li><p>只能在回忆一下0是48，A是65，a是97 小写再大写后面</p>
</li>
<li><p>0-9直接直接用数字表示，10-23用A到N代替</p>
</li>
<li><p>‘A’-‘A’=0 ，+1代表字母表中的相对位置，+10代表10</p>
</li>
<li><p>即题目所需要的10-23，用字母完成转换</p>
</li>
</ul>
<hr>
<hr>
<pre><code>import java.util.Scanner;

public class PAT_B1014_2 {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        String s1 = sc.nextLine();
        String s2 = sc.nextLine();
        String s3 = sc.nextLine();
        String s4 = sc.nextLine();
        boolean isDay = false;
        boolean isHour = false;
        for (int i = 0; i &lt; s1.length() &amp;&amp; i &lt; s2.length(); i++) {

            if (s1.charAt(i) == s2.charAt(i)) {

                if (s1.charAt(i) == s2.charAt(i)) {                      //判断字符是不是数字
                    if (((s1.charAt(i) &gt;= &#39;A&#39; &amp;&amp; s1.charAt(i) &lt;= &#39;N&#39;) || Character.isDigit(s1.charAt(i))) &amp;&amp; !isHour
                            &amp;&amp; isDay) { //A到N 先进行time的判读，如果先进行day的time会取得和day一样的数据
                        isHour = true;
                        if (s1.charAt(i) &gt;= &#39;0&#39; &amp;&amp; s1.charAt(i) &lt;= &#39;9&#39;) {
                            System.out.print(&quot;0&quot; + s1.charAt(i)); //如果为0到9的输字输出数字再在前面加0
                        } else {
                            System.out.print(s1.charAt(i) - &#39;A&#39;+ 10);//加1就是字母在字母表中的相对位置,再加9为所要求的时间
                        }
                    }
                }

                if (s1.charAt(i) &gt;= &#39;A&#39; &amp;&amp; s1.charAt(i) &lt;= &#39;G&#39; &amp;&amp; !isDay) {
                    isDay = true;
                    switch (s1.charAt(i)) {
                        case &#39;A&#39;:
                            System.out.print(&quot;MON &quot;);
                            break;
                        case &#39;B&#39;:
                            System.out.print(&quot;TUE &quot;);
                            break;
                        case &#39;C&#39;:
                            System.out.print(&quot;WED &quot;);
                            break;
                        case &#39;D&#39;:
                            System.out.print(&quot;THU &quot;);
                            break;
                        case &#39;E&#39;:
                            System.out.print(&quot;FRI &quot;);
                            break;
                        case &#39;F&#39;:
                            System.out.print(&quot;SAT &quot;);
                            break;
                        case &#39;G&#39;:
                            System.out.print(&quot;SUN &quot;);
                            break;
                    }
                }
            }
        }

        for (int i = 0; i &lt; s3.length() &amp;&amp; i &lt; s4.length(); i++) {
            if ((Character.isUpperCase(s3.charAt(i)) || Character.isLowerCase(s3.charAt(i))) //只读取相同的字母
                    &amp;&amp; s3.charAt(i) == s4.charAt(i)) {
                System.out.printf(&quot;:%02d&quot;, i); //补齐零加冒号 14:00
            }
        }
    }
}
</code></pre>
